# ==========================================
# Application
# ==========================================
spring.application.name=QueueUp

# Render automatically provides PORT
server.port=${PORT:8080}

# ==========================================
# Undertow
# ==========================================
server.undertow.threads.io=4
server.undertow.threads.worker=8

# ==========================================
# H2 Database
# ==========================================
spring.datasource.url=jdbc:h2:file:./data/queueup;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# JPA
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# HikariCP
# ==========================================
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# ==========================================
# H2 Console
# ==========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# Static Resources
# ==========================================
spring.web.resources.static-locations=classpath:/static/

# ==========================================
# Logging
# ==========================================
logging.level.org.springframework.web.socket=WARN
logging.level.com.queueup.websocket=INFO

# ==========================================
# CORS
# ==========================================
frontend.url=${FRONTEND_URL:http://localhost:8080}